services:
  dev:
    image: php:8.2-cli
    working_dir: /workspace
    command: sleep infinity
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: armygame
      MYSQL_DATABASE: armygame

  web:
    image: php:8.2-apache
    working_dir: /workspace/www
    ports:
      - "8080:80"

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: armygame
      MYSQL_DATABASE: armygame
    ports:
      - "3306:3306"
